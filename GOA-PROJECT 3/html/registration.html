<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Movie Group Registration</title>
    <link rel="stylesheet" href="../css/registracion.css">
</head>
<body>
    <header>
        <button class="btn2"><a href="./comming soon.html">back</a></button>
    </header>
    <img src="https://cdn.pixabay.com/photo/2016/04/14/07/50/film-1328405_1280.jpg" width="700">
    <div class="registration-container">
        <h1>🎬 Film Registration</h1>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required />
    
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required />
    
            <label for="password">Create Password</label>
            <input type="password" id="password" placeholder="Create a password" required />
    
            <button class="btn" type="submit">Register</button>
            
        </form>
        <div class="footer">
            © 2025 Cinema Group | For movie lovers
        </div>
    </div>
</body>
</html>
