<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/payment.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="head">
                <img src="https://i.pinimg.com/564x/5f/74/4f/5f744fbc2d95aaa855b6be79a4656d0a.jpg" alt="">
                <h2 class="h2">Capital <h2 class="h2" id="h2">Shop</h2></h2>
            </div>
            <div class="header-a">
                <a href="./home.html">Home</a>
                <a href="./Men.html">Men</a>
                <a href="./Women.html">Women</a>
                <a href="./Baby.html">Baby Colection</a>
                <a href="./setting.html">Setting</a>
                <a href="./register.html">register</a>
                <a href="./contact.html">contact</a>
                <input type="search" name="search" id="search">
                <img id="search-photo" src="../photo/search-interface-symbol (1).png" width="21px" alt="">
            </div>
        </div>
    </header>
    <main>
        <div class="main">
            <h2>Make a payment</h2>

            <div class="product">
                <div class="product-info">
                    <h3>Product name</h3>
                    <p>Brand: Zara brand</p>
                    <p>Price: $99.99</p>
                </div>
            </div>

            <form>
                <div class="form-row">
                    <label for="card">Card number</label>
                    <input type="text" id="card" placeholder="1234 5678 9012 3456">
                </div>

                <div class="cardd">
                    <div class="col">
                        <div class="from-row">
                            <label for="date">Expiry (MM/YY)</label>
                            <input type="text" id="date" placeholder="MM/YY">
                        </div>
                        <div class="col">
                            <div class="from-row">
                                <label for="cvc">CVC</label>
                                <input type="text" id="cvc" placeholder="123">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="fullname">Full name</label>
                        <input type="text" id="fullname" placeholder="Your name">
                    </div>

                    <div class="form-row">
                        <label for="idnum">Personal ID (Demo)</label>
                        <input type="text" id="idnum" placeholder="01001012345">
                    </div>

                <a class="pay-btn" href="">Pay</a>

                </div>
            </form>
        </div>
    </main>
</body>
</html>
